name: delete_message
description: >-
  Delete one or more messages from a chat. With revoke=true (default) they are
  removed for everyone (subject to Telegram's rules on who/when); revoke=false
  removes only your local copy. Returns { deleted, message_ids }.
fields:
  chat:
    description: >-
      Target chat/user (required). Accepts a @username (e.g. '@durov'), a
      numeric id, a string id, or the literal 'me' for your own Saved Messages.
      Numeric ids resolve reliably only after the entity has been seen this
      session (e.g. via list_dialogs) — prefer @username when possible.
  message_ids:
    description: Ids of the messages to delete in the target chat.
  revoke:
    description: >-
      When true (default), deletes the message for everyone. When false, deletes
      only your local copy where Telegram allows it.
