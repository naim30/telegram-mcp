name: get_message_read_by
description: >-
  For a message in a small group, list which users have read it (read receipts).
  Only works where Telegram exposes per-message read receipts — small groups and
  recent messages. Returns { user_ids }.
fields:
  chat:
    description: >-
      Target chat/user (required). Accepts a @username (e.g. '@durov'), a
      numeric id, a string id, or the literal 'me' for your own Saved Messages.
      Numeric ids resolve reliably only after the entity has been seen this
      session (e.g. via list_dialogs) — prefer @username when possible.
  message_id:
    description: >-
      Id of the message to check read receipts for, in the target chat.
