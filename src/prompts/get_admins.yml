name: get_admins
description: >-
  List the administrators of a group or channel. Returns { count, admins } where
  each admin is a user summary. Read-only companion to list_participants.
fields:
  chat:
    description: >-
      Target chat/user (required). Accepts a @username (e.g. '@durov'), a
      numeric id, a string id, or the literal 'me' for your own Saved Messages.
      Numeric ids resolve reliably only after the entity has been seen this
      session (e.g. via list_dialogs) — prefer @username when possible.
  limit:
    description: Maximum number of admins to return (1–200, default 100).
